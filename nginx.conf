# /etc/nginx/nginx.conf
# nginx reverse proxy configuration for our D&D Dating Website
# we need to run it as: sudo nginx -t (test) then sudo systemctl reload nginx (apply)

# Run nginx as a low-privilege user, not root
user nginx;

# Automatically match the number of worker processes to CPU cores
worker_processes auto;

error_log /var/log/nginx/error.log warn;
pid /run/nginx.pid;

include /usr/share/nginx/modules/*.conf;

events {
    # Maximum simultaneous connections per worker process, 
    # so nginx can handle many clients without running out of resources.
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

# Here we are configuring the HTTP server that will handle all incoming requests,
# apply security measures, and proxy them to our Node.js app, which is running on localhost:3000. 
# We also have a catch-all server to redirect any HTTP traffic to HTTPS, ensuring all communication is encrypted.
http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Hide nginx version from response headers to prevent version-targeted attacks, 
    # that is when attackers try to exploit known vulnerabilities in specific nginx versions.
    server_tokens off;

    # Log format includes response time and upstream timing for debugging
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time uct="$upstream_connect_time" '
                    'uht="$upstream_header_time" urt="$upstream_response_time"';

    access_log /var/log/nginx/access.log main;

    # Here we are implementing it so nginx will only accept requests with a body size of 10MB or less, 
    # This is so attackers cant add large paylods, such as file uploads or large JSON payloads.
    # This also helps prevent denial of service attacks that send excessively large payloads.
    client_max_body_size 10M;

    # Timeouts to prevent slow-loris attacks where attackers hold connections open
    client_body_timeout 12s;
    client_header_timeout 12s;
    keepalive_timeout 15s;
    send_timeout 10s;

    # Buffer limits to prevent buffer overflow attacks
    client_body_buffer_size 128k;
    client_header_buffer_size 1k;
    large_client_header_buffers 4 16k;

    # Compress responses to reduce bandwidth and improve load times
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript application/xml application/xml+rss text/javascript;

    # Rate limiting zones, stored in shared memory, used to block brute force attacks
    # we have an 'general' zone: where we have 10 requests/second for normal traffic
    # Then we have a 'login' zone: where we have 1 request/second for sensitive endpoints like /login and /register
    limit_req_zone $binary_remote_addr zone=general:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=login:10m rate=1r/s;

    # The Node.js app running on localhost,it is not exposed directly to the network
    upstream node_app {
        server 127.0.0.1:3000;
        keepalive 32;
    }

    # Catch-all: redirect any plain HTTP request to HTTPS
    server {
        listen 80 default_server;
        server_name _;
        return 301 https://$host$request_uri;
    }

    # Main HTTPS server
    server {
        listen 443 ssl http2;
        server_name 10.20.20.24;

        # Self-signed certificate generated by scripts/generate-ssl.sh
        ssl_certificate /etc/nginx/ssl/selfsigned.crt;
        ssl_certificate_key /etc/nginx/ssl/selfsigned.key;

        # Only allow modern TLS versions, disables TLS 1.0 and 1.1 which have known vulnerabilities
        ssl_protocols TLSv1.2 TLSv1.3;

        # Strong cipher suites only, ECDHE provides forward secrecy, where compromising the server's private key does not allow decryption of past sessions.
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;

        # Let clients pick the cipher, it is required for TLS 1.3 to work correctly.
        ssl_prefer_server_ciphers off;

        # Cache SSL sessions to reduce handshake overhead, but disable session tickets
        # as session tickets can weaken forward secrecy if not implemented securely.
        # it is so that if an attacker compromises the server's private key, they cannot decrypt past sessions that used session tickets.
        ssl_session_timeout 1d;
        ssl_session_cache shared:SSL:50m;
        ssl_session_tickets off;

        # Here we have Security headers sent with every response. 

        # we force HTTPS for 1 year, the browser will refuse to connect over HTTP
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        # Prevent this site being loaded inside an iframe, clickjacking protection.
        add_header X-Frame-Options "SAMEORIGIN" always;

        # Prevent browsers from guessing the content type, such as MIME sniffing attacks
        add_header X-Content-Type-Options "nosniff" always;

        # We only send the origin as referrer, not the full URL
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # We also block flash and PDF cross-domain requests, so that if an attacker tries to load our site in a flash or PDF file, it cannot access any data.
        add_header X-Permitted-Cross-Domain-Policies "none" always;

        # we do not cache any responses, so sensitive app data should never be cached by the browser or any intermediate proxies, which could be a security risk if cached.
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;

        # Remove the X-Powered-By header that Node/Express adds
        proxy_hide_header X-Powered-By;

        # Forward all requests to the Node app
        location / {
            proxy_pass http://node_app;
            proxy_http_version 1.1;

            # Pass the real client IP to Node so logging and rate limiting work correctly
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";

            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;

            proxy_buffering on;
            proxy_buffer_size 4k;
            proxy_buffers 8 16k;
            proxy_busy_buffers_size 24k;
        }

        # Cache static files for 1 day to improve performance
        location /stylesheets/ {
            proxy_pass http://node_app;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            add_header Cache-Control "public, max-age=86400";
        }

        location /javascripts/ {
            proxy_pass http://node_app;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            add_header Cache-Control "public, max-age=86400";
        }

        location /images/ {
            proxy_pass http://node_app;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            add_header Cache-Control "public, max-age=86400";
        }

        # Here we force uploaded files to download as attachments, so they are never rendered in the browser
        # This prevents an uploaded HTML or JS file from executing as a web page
        location /uploads/ {
            proxy_pass http://node_app;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            add_header Content-Disposition "attachment";
            add_header X-Content-Type-Options "nosniff";
        }

        # Block access to hidden files such as .env, .git, .htaccess
        location ~ /\. {
            deny all;
            access_log off;
            log_not_found off;
        }

        # Strict rate limiting on login, max 1 req/s with a burst of 5 to prevent brute-force attacks on the login endpoint, but allow some bursts for legitimate users.
        location = /login {
            limit_req zone=login burst=5 nodelay;
            proxy_pass http://node_app;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Strict rate limiting on register, max 1 req/s with a burst of 3 to prevent account creation abuse, but allow some burst for legitimate users.
        location = /register {
            limit_req zone=login burst=3 nodelay;
            proxy_pass http://node_app;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Health check endpoint for monitoring, we have logging disabled to keep logs clean, and we do not apply rate limiting to allow monitoring systems to check the health of the app without restrictions.
        location /health {
            proxy_pass http://node_app;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            access_log off;
        }
    }
}